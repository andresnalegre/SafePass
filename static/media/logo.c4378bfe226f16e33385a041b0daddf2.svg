<svg width="400" height="400" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
  </defs>

  <!-- Centered Group -->
  <g transform="translate(30,0)">
    
    <!-- Shield -->
    <path d="M150 50 L250 90 L250 180 C250 250 200 300 150 330 C100 300 50 250 50 180 L50 90 Z"
          fill="url(#grad)" stroke="#0a0a0a" stroke-width="4"/>

    <!-- Lock Body -->
    <rect x="105" y="170" width="90" height="75" rx="18" fill="white"/>

    <!-- Lock Shackle -->
    <path d="M120 170 V135 A30 30 0 0 1 180 135 V170"
          stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Keyhole -->
    <circle cx="150" cy="205" r="8" fill="#0072ff"/>
    <rect x="146" y="205" width="8" height="18" rx="3" fill="#0072ff"/>

  </g>
</svg>